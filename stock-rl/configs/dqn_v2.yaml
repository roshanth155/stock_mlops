version: "2"

# --- Data ---
ticker:       "AAPL"
train_start:  "2015-01-01"
train_end:    "2022-12-31"
eval_start:   "2023-01-01"
eval_end:     "2024-12-31"

# --- Environment ---
initial_cash: 10000.0
window:       20

# --- DQN Agent ---
gamma:              0.99
lr:                 0.0005
batch_size:         128
buffer_size:        20000

# --- Exploration ---
epsilon_start:      1.0
epsilon_min:        0.01
epsilon_decay:      0.997

# --- Training ---
episodes:           200
target_update_freq: 100